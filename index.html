<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="dark bg-white dark:bg-[#090d1a] text-slate-800 dark:text-slate-200 antialiased transition-colors duration-300">

    <header class="border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 bg-white/80 dark:bg-[#090d1a]/80 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <span class="text-2xl font-black cursor-pointer" onclick="showSection('landing')">Market<span class="text-blue-500">Hub.</span></span>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="group relative flex items-center justify-center w-12 h-6 bg-slate-200 dark:bg-slate-700 rounded-full transition-all duration-300 hover:bg-blue-500/20">
                    <div id="themeToggleThumb" class="absolute left-1 w-4 h-4 bg-white rounded-full shadow-sm transition-all duration-300 dark:translate-x-6"></div>
                    <span class="text-[10px] ml-5 dark:hidden">☀️</span>
                    <span class="text-[10px] mr-5 hidden dark:block">🌙</span>
                </button>

                <div onclick="toggleCartDrawer()" class="cursor-pointer">🛒</div>
                
                <div class="relative">
                    <button onclick="toggleSettingsDropdown(event)" class="text-xs font-bold hover:text-blue-500">Settings ▼</button>
                    <div id="settingsDropdownMenu" class="hidden absolute right-0 mt-3 w-48 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-2 shadow-xl z-50">
                        <a href="mailto:goodiecodes@gmail.com" class="block px-3 py-2 text-xs font-medium hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">Help Desk (Email)</a>
                        <button onclick="showSection('sellerhub')" class="w-full text-left px-3 py-2 text-xs font-medium hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg mt-1">Storefront Hub</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main id="landingSection" class="max-w-7xl mx-auto px-6 py-24 text-center">
        <h1 class="text-6xl font-black mb-6">MarketHub</h1>
        <p class="text-xl text-slate-500 mb-10">Connect instantly. Trade locally.</p>
        <button onclick="showSection('homepage')" class="bg-blue-600 text-white px-8 py-4 rounded-xl font-bold">Explore Marketplace</button>
    </main>

    <script>
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('marketHubTheme', isDark ? 'dark' : 'light');
        }

        function toggleSettingsDropdown(e) { 
            e.stopPropagation(); 
            document.getElementById('settingsDropdownMenu').classList.toggle('hidden'); 
        }

        // Close dropdown on outside click
        document.addEventListener('click', () => document.getElementById('settingsDropdownMenu').classList.add('hidden'));

        function showSection(targetSectionId) {
            // Logic as before...
        }
        
        // ... (Keep the rest of your robust logic from Untitled-1.html)
    </script>
</body>
</html>
